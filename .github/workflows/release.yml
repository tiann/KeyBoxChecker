name: Release single-file app

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Test
        run: bun test

      - name: Build single index.html
        run: bun run build

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          TARGET_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          NOTES_FILE="/tmp/keybox-checker-release-notes.md"
          printf "%s\n\n%s\n" \
            "Download \`index.html\` and open it in a browser to run KeyBox Checker locally." \
            "The file is a single-file, pure-frontend build. It uses the bundled offline trust/revocation snapshot and does not upload keybox contents." \
            > "$NOTES_FILE"

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" dist/index.html --clobber
          else
            gh release create "$TAG_NAME" dist/index.html \
              --target "$TARGET_SHA" \
              --title "KeyBox Checker $TAG_NAME" \
              --notes-file "$NOTES_FILE"
          fi
